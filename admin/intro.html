<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin • Intro</title>
  <link rel="stylesheet" href="/public/assets/css/style.css" />
  <style>
    .stars { position: fixed; inset: 0; background: radial-gradient(2px 2px at 20% 30%, #6ae3ff, transparent), radial-gradient(1.5px 1.5px at 70% 60%, #7c5cff, transparent), radial-gradient(1.2px 1.2px at 40% 80%, #6ae3ff, transparent); opacity: 0.6; }
    .ring { width: 180px; height: 180px; border-radius: 50%; border: 4px solid rgba(122,92,255,0.25); border-top-color: #6ae3ff; animation: spin 1.2s linear infinite; margin: 24px auto 0; }
    @keyframes spin { to { transform: rotate(360deg);} }
  </style>
  <script defer src="/public/assets/js/intro.js"></script>
</head>
<body>
  <div class="intro">
    <div>
      <div class="logo-3d">Admin Portal</div>
      <div class="ring"></div>
    </div>
    <div class="stars"></div>
  </div>
</body>
</html>
